name: Run Pytest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositori
      uses: actions/checkout@v3

    - name: Instal·lar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instal·lar dependències
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Executar tests
      run: pytest
